    Projects:
      - name: MetaphorModel.org
        summary: >
          AI-powered computational ecosystem for cultural narrative analysis, developed as part of the PhD research.
          Comprises three integrated platforms for metaphor management, automatic detection, and corpus exploration.
        highlights:
          - "Metaphor Manager (manager.metaphormodel.org): management and analysis of metaphorical expressions in textual corpora"
          - "MELT Processing (melt.metaphormodel.org): automatic metaphor detection via Metaphor Field-Loop Theory"
          - "Research Corpus (corpus.metaphormodel.org): exploration platform for the conceptual metaphor corpus from Colombia's Truth Commission Final Report"
        start_date: 2024
        end_date: present

